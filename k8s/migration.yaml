apiVersion: batch/v1
kind: Job
metadata:
  name: fcg-user-db-migration
  labels:
    app: fcg-user-migration
spec:
  ttlSecondsAfterFinished: 120
  backoffLimit: 3 
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migration-user-runner
        image: alexoliverdev/fcg-usuario-api:latest
        command: ["./efbundle"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "300m"
            memory: "256Mi"
        env:
          - name: DatabaseSettings__Host
            valueFrom:
              configMapKeyRef:
                name: user-config
                key: DB_SERVER
          - name: DatabaseSettings__Port
            valueFrom:
              configMapKeyRef:
                name: user-config
                key: DB_PORT
          - name: DatabaseSettings__DatabaseName
            valueFrom:
              configMapKeyRef:
                name: user-config
                key: DB_NAME
          - name: DatabaseSettings__Username
            valueFrom:
              secretKeyRef:
                name: user-opaque
                key: DB_USER
          - name: DatabaseSettings__Password
            valueFrom:
              secretKeyRef:
                name: user-opaque
                key: DB_PASS