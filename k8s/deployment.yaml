apiVersion: apps/v1
kind: Deployment
metadata:
  name: fcg-users-api-deployment
  labels:
    app: fcg-users-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fcg-users-api
  template:
    metadata:
      labels: 
        app: fcg-users-api
      annotations:
        autor: Alex O Ferreira
        description: "Deployment do microsservico de Usuarios API do Fiap Cloud Games"
    spec:
      initContainers:
      - name: c-users-db-migration
        image: alexoliverdev/fcg-usuario-api:latest     
        command: ["./efbundle", "--connection", "$(ConnectionStrings__UserConnection)"]   
        env:
          - name: K8S_DB_SERVER
            valueFrom: { configMapKeyRef: { name: user-config, key: DB_SERVER } }
          - name: K8S_DB_PORT
            valueFrom: { configMapKeyRef: { name: user-config, key: DB_PORT } }
          - name: K8S_DB_NAME 
            valueFrom: { configMapKeyRef: { name: user-config, key: DB_NAME } }
          - name: K8S_DB_USER
            valueFrom: { secretKeyRef: { name: user-opaque, key: DB_USER } }
          - name: K8S_DB_PASS
            valueFrom: { secretKeyRef: { name: user-opaque, key: DB_PASS } }
          - name: K8S_DB_TRUST_CERT
            valueFrom: { configMapKeyRef: {name: user-config,key: DB_TRUST_CERT }}
          - name: "ConnectionStrings__UserConnection"
            value: "Server=$(K8S_DB_SERVER),$(K8S_DB_PORT);Database=$(K8S_DB_NAME);User Id=$(K8S_DB_USER);Password=$(K8S_DB_PASS);TrustServerCertificate=$(K8S_DB_TRUST_CERT);"
      containers:
      - name: c-fcg-users-api
        image: alexoliverdev/fcg-usuario-api:latest
        ports:
        - containerPort: 8080
        env:
          - name: K8S_RABBITMQ_SERVER
            valueFrom: { configMapKeyRef: {name: user-config, key: RABBITMQ_SERVER } }
          - name: K8S_RABBITMQ_PORT
            valueFrom: { configMapKeyRef: {name: user-config, key: RABBITMQ_PORT } }
          - name: K8S_RABBITMQ_USER
            valueFrom: { secretKeyRef: { name: user-opaque, key: RABBITMQ_USER }}
          - name: K8S_RABBITMQ_PASSWORD
            valueFrom: { secretKeyRef: { name: user-opaque, key: RABBITMQ_PASS } }
          - name: K8S_DB_SERVER
            valueFrom: { configMapKeyRef: { name: user-config,key: DB_SERVER } }
          - name: K8S_DB_NAME
            valueFrom: { configMapKeyRef: {name: user-config,key: DB_NAME } }
          - name: K8S_DB_PORT
            valueFrom: { configMapKeyRef: {name: user-config,key: DB_PORT }}
          - name: K8S_DB_TRUST_CERT
            valueFrom: { configMapKeyRef: {name: user-config,key: DB_TRUST_CERT }}
          - name: K8S_ENVIRONMENT
            valueFrom: {configMapKeyRef: {name: user-config,key: ENVIRONMENT}}
          - name: K8S_DB_USER
            valueFrom: { secretKeyRef: {name: user-opaque,key: DB_USER }}
          - name: K8S_DB_PASS
            valueFrom: { secretKeyRef: {name: user-opaque,key: DB_PASS }}
          - name: K8S_JWT_SECRET
            valueFrom: { secretKeyRef: {name: user-opaque,key: JWT_SECRET }}
          - name: "ConnectionStrings__RabbitMq"
            value: "amqp://$(K8S_RABBITMQ_USER):$(K8S_RABBITMQ_PASSWORD)@$(K8S_RABBITMQ_SERVER):$(K8S_RABBITMQ_PORT)"
          - name: "ConnectionStrings__UserConnection"
            value: "Server=$(K8S_DB_SERVER),$(K8S_DB_PORT);Database=$(K8S_DB_NAME);User Id=$(K8S_DB_USER);Password=$(K8S_DB_PASS);TrustServerCertificate=$(K8S_DB_TRUST_CERT);"
          - name: "JwtSettings__Secret"
            value: "$(K8S_JWT_SECRET)"
          - name: "ASPNETCORE_ENVIRONMENT"
            value: "$(K8S_ENVIRONMENT)"
        livenessProbe:
          httpGet:
            path: /health/liveness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/readiness
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5